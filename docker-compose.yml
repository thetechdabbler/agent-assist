# Full stack: Postgres, Redis, OpenSearch, MinIO, backend API, frontend UI.
# Usage:  cp .env.docker.example .env   # optional; defaults work for local dev
#         docker compose up --build -d
# OpenSearch needs ~1GB free RAM; on Linux set: sudo sysctl -w vm.max_map_count=262144

name: agent-assist

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_assist
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agent_assist']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
      - bootstrap.memory_lock=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - '9200:9200'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      # Single-node often reports yellow; accept 200 from _cluster/health
      test:
        [
          'CMD-SHELL',
          'curl -sSf http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=30s || exit 1',
        ]
      interval: 20s
      timeout: 30s
      retries: 30
      start_period: 180s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  # Creates S3 bucket once MinIO is up (backend expects this bucket for uploads)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb "local/$${S3_BUCKET}" --ignore-existing
        echo "MinIO bucket ready."
    environment:
      S3_BUCKET: ${S3_BUCKET:-agent-assist-dev}
    restart: 'no'

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: '4000'
      HOST: '0.0.0.0'
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_assist
      REDIS_URL: redis://redis:6379
      OPENSEARCH_URL: http://opensearch:9200
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: ${S3_BUCKET:-agent-assist-dev}
      S3_REGION: us-east-1
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-openssl-rand-hex-32-in-production}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-change-me-use-openssl-rand-hex-32-in-production}
      NEXTAUTH_URL: http://localhost:3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1:4000/health\",r=>{let d=\"\";r.on(\"data\",c=>d+=c);r.on(\"end\",()=>process.exit(r.statusCode===200?0:1))}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: '0.0.0.0'
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-change-me-use-openssl-rand-hex-32-in-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  minio_data:
