# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Frontend runs in dev mode with your local source mounted; code changes apply without rebuild.
# The entrypoint runs pnpm install so the node_modules volume is populated (fixes CSS/loader errors).
# Backend and other services are unchanged.

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      NODE_ENV: development
      PORT: '3000'
      HOSTNAME: '0.0.0.0'
      AUTH_TRUST_HOST: 'true'
      API_SERVER_URL: http://backend:4000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-change-me-use-openssl-rand-hex-32-in-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}

volumes:
  frontend_node_modules:
